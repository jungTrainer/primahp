<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>프리마요양병원 관리자 가입</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-100 text-slate-900"><main class="mx-auto flex min-h-screen max-w-xl items-center px-5 py-12"><section class="w-full rounded-3xl bg-white p-7 shadow-xl sm:p-10"><div class="flex items-center gap-3"><img src="assets/logo.png" class="h-12 w-12 object-contain" alt="로고"><div><h1 class="text-2xl font-black">관리자 회원가입</h1><p class="text-sm text-slate-500">가입 후 최고관리자의 승인이 필요합니다.</p></div></div><form id="register-form" class="mt-8 grid gap-4"><label class="text-sm font-bold">이름<input id="name" required maxlength="50" class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"></label><label class="text-sm font-bold">소속 부서<input id="department" required maxlength="80" class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"></label><label class="text-sm font-bold">연락처<input id="phone" required maxlength="20" placeholder="010-0000-0000" class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"></label><label class="text-sm font-bold">이메일<input id="email" type="email" required class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"></label><label class="text-sm font-bold">비밀번호<input id="password" type="password" required minlength="8" class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"><span class="mt-1 block text-xs font-normal text-slate-400">8자 이상으로 설정해 주세요.</span></label><label class="text-sm font-bold">신청 권한<select id="requested-role" class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"><option value="content-admin">전체 콘텐츠 관리자</option><option value="meal-publisher">식단 게시자</option></select></label><div id="status" class="hidden rounded-xl border p-4 text-sm"></div><button class="rounded-xl bg-slate-950 px-5 py-4 font-black text-white">가입 신청</button></form><div class="mt-5 flex justify-between text-sm"><a href="admin.html" class="font-bold text-sky-700">관리자 로그인</a><a href="index.html" class="text-slate-500">홈페이지</a></div></section></main><script src="firebase-config.js"></script><script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script><script src="assets/register.js"></script></body></html>
