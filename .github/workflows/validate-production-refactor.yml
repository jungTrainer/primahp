name: Validate production refactor

on:
  pull_request_target:
    types: [reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/production-ready-refactor'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-ready-refactor
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remove remaining administrator editor runtime from public page
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          start_marker = '      /* ================= 8. INLINE SECTIONS EDITORS ================= */'
          end_marker = '      /* ================= 10. PUBLIC USER INPUTS & VALIDATION ================= */'
          start = text.find(start_marker)
          end = text.find(end_marker)
          if start >= 0 and end > start:
              text = text[:start] + end_marker + text[end + len(end_marker):]

          forbidden = [
              'toggleSectionEdit',
              'applySectionEdit',
              'isAdminLoggedIn',
              'submitAdminLogin',
              'renderAdminDashboard',
              'openStaffAddModal',
              'openAddAlbumModal',
              'openAddNoticeModal',
              'handleStaffPhotoUpload',
              'handleAlbumPhotoUpload',
              'id="view-admin"',
              'id="loginModal"',
              'id="staffModal"',
              'id="albumModal"',
              'id="noticeModal"'
          ]
          remaining = [item for item in forbidden if item in text]
          if remaining:
              raise SystemExit('Administrator residue remains in public page: ' + ', '.join(remaining))

          path.write_text(text, encoding='utf-8')
          PY

      - name: Check public module JavaScript syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          start = text.index('<script type="module">') + len('<script type="module">')
          end = text.index('</script>', start)
          Path('/tmp/public-index.mjs').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/public-index.mjs

      - name: Install Chromium test runtime
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          python3 -m http.server 4173 > /tmp/primahp-server.log 2>&1 &
          echo $! > /tmp/primahp-server.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/index.html >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/primahp-server.log
          exit 1

      - name: Run Chromium smoke tests
        run: |
          cat > /tmp/smoke.mjs <<'JS'
          import { chromium } from 'playwright';
          import assert from 'node:assert/strict';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
          const pageErrors = [];
          page.on('pageerror', error => pageErrors.push(error.message));

          await page.goto('http://127.0.0.1:4173/index.html', { waitUntil: 'domcontentloaded' });
          await page.waitForTimeout(1000);
          assert.equal(await page.locator('body').getAttribute('data-page'), 'public');
          assert.equal(await page.locator('#view-home').evaluate(el => el.classList.contains('active')), true);

          for (const view of ['about', 'staff', 'guide', 'gallery', 'notice', 'directions']) {
            await page.locator(`#gnb-${view}`).click();
            await page.waitForTimeout(100);
            assert.equal(await page.locator(`#view-${view}`).evaluate(el => el.classList.contains('active')), true, `${view} view should be active`);
            assert.equal(new URL(page.url()).hash, `#${view}`);
          }

          await page.locator('#gnb-staff').click();
          assert.ok(await page.locator('#staff-grid > *').count() > 0, 'staff cards should render');

          await page.locator('#gnb-gallery').click();
          assert.ok(await page.locator('#gallery-grid > *').count() > 0, 'gallery cards should render');

          await page.locator('#gnb-notice').click();
          assert.ok(await page.locator('#notice-table-body tr').count() > 0, 'notice rows should render');
          await page.locator('#notice-table-body tr').first().click();
          await page.waitForTimeout(100);
          assert.equal(await page.locator('#noticeViewModal').evaluate(el => !el.classList.contains('hidden')), true);
          assert.ok(new URL(page.url()).hash.startsWith('#notice/'));
          await page.locator('#noticeViewModal button').first().click();

          await page.locator('#gnb-home').click();
          await page.locator('#inquiryName').fill('테스트 환자');
          await page.locator('#inquiryPhone').fill('01012345678');
          await page.locator('#inquiryMsg').fill('자동 브라우저 검증용 문의');
          await page.locator('#inquiryPrivacyConsent').check();
          await page.locator('#inquirySensitiveConsent').check();
          await page.locator('#widgetInquiryForm button[type="submit"]').click();
          await page.waitForTimeout(100);
          assert.match(await page.locator('#toast-msg').textContent(), /올바른 연락처/);

          await page.locator('#inquiryPhone').fill('010-1234-5678');
          await page.locator('#widgetInquiryForm button[type="submit"]').click();
          await page.waitForTimeout(100);
          assert.equal(await page.locator('#inquiryReceiptBox').evaluate(el => !el.classList.contains('hidden')), true);
          assert.match(await page.locator('#inquiryReceiptBox').textContent(), /PR-\d{8}-\d{6}/);

          await page.goto('http://127.0.0.1:4173/privacy.html', { waitUntil: 'domcontentloaded' });
          assert.match(await page.locator('body').textContent(), /개인정보/);

          await page.goto('http://127.0.0.1:4173/admin.html', { waitUntil: 'domcontentloaded' });
          await page.waitForTimeout(500);
          assert.equal(await page.locator('body').getAttribute('data-page'), 'admin');
          assert.match(await page.locator('meta[name="robots"]').getAttribute('content'), /noindex/);
          assert.equal(await page.locator('#loginModal').count(), 1);
          assert.equal(await page.locator('#view-admin').count(), 1);

          const mobile = await browser.newPage({ viewport: { width: 390, height: 844 } });
          await mobile.goto('http://127.0.0.1:4173/index.html', { waitUntil: 'domcontentloaded' });
          await mobile.locator('button[onclick="toggleMobileMenu()"]').first().click();
          assert.equal(await mobile.locator('#mobileMenu').evaluate(el => !el.classList.contains('hidden')), true);
          await mobile.locator('#mobileMenu button[onclick="toggleMobileMenu()"]').click();
          assert.equal(await mobile.locator('#mobileMenu').evaluate(el => el.classList.contains('hidden')), true);
          await mobile.close();

          assert.deepEqual(pageErrors, [], `Browser page errors: ${pageErrors.join(' | ')}`);
          await browser.close();
          console.log('Chromium smoke tests passed.');
          JS
          node /tmp/smoke.mjs

      - name: Commit validated public cleanup
        run: |
          if git diff --quiet; then
            echo 'No cleanup changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Remove remaining admin runtime from public page'
          git push origin HEAD:agent/production-ready-refactor
