name: Apply priority privacy patch

on:
  push:
    branches:
      - agent/privacy-and-routing
    paths:
      - scripts/apply-priority-patch.js
      - .github/workflows/apply-priority-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/privacy-and-routing
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply patch
        run: node scripts/apply-priority-patch.js
      - name: Validate key changes
        run: |
          grep -q 'inquiryPrivacyConsent' index.html
          grep -q 'inquirySensitiveConsent' index.html
          grep -q 'commentPrivacyConsent' index.html
          grep -q 'routeFromHash' index.html
          grep -q 'confirmModalBtnNo' index.html
      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Apply privacy consent and hash routing updates'
          git push origin HEAD:agent/privacy-and-routing
