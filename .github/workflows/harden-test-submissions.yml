name: Harden test submissions

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/harden-test-submissions.yml'

permissions:
  contents: write

jobs:
  patch-test-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-ready-refactor
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Harden public submissions and notice views
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          text, n = re.subn(
              r"      let inquiries = \[.*?\n      \];\n\n      let publicComments = \[.*?\n      \];",
              "      let inquiries = [];\n\n      let publicComments = [];",
              text,
              count=1,
              flags=re.S,
          )
          if n != 1:
              raise SystemExit('Could not remove realistic fallback personal data')

          start_marker = '      /* ================= 10. PUBLIC USER INPUTS & VALIDATION ================= */'
          end_marker = '      /* ================= 13. STAFF / GALLERY / PUBLIC NOTICES ================= */'
          start = text.index(start_marker)
          end = text.index(end_marker, start)

          replacement = r'''      /* ================= 10. PUBLIC USER INPUTS & VALIDATION ================= */
      const setFormSubmitting = (formId, isSubmitting) => {
        const form = document.getElementById(formId);
        if (!form) return;
        const button = form.querySelector('button[type="submit"]');
        if (!button) return;
        button.disabled = isSubmitting;
        button.classList.toggle('opacity-60', isSubmitting);
        button.classList.toggle('cursor-not-allowed', isSubmitting);
        button.setAttribute('aria-busy', String(isSubmitting));
      };

      const showInquiryResult = (html, state = 'success') => {
        const receiptBox = document.getElementById('inquiryReceiptBox');
        if (!receiptBox) return;
        receiptBox.className = state === 'error'
          ? 'rounded-xl border border-rose-200 bg-rose-50 p-3 text-[11px] text-rose-900'
          : state === 'local'
            ? 'rounded-xl border border-amber-200 bg-amber-50 p-3 text-[11px] text-amber-900'
            : 'rounded-xl border border-emerald-200 bg-emerald-50 p-3 text-[11px] text-emerald-900';
        receiptBox.innerHTML = html;
      };

      const submitHomeInquiry = async (event) => {
        event.preventDefault();

        const form = document.getElementById('widgetInquiryForm');
        const name = document.getElementById('inquiryName').value.trim();
        const phone = document.getElementById('inquiryPhone').value.trim();
        const room = document.getElementById('inquiryRoom').value;
        const msg = document.getElementById('inquiryMsg').value.trim();
        const privacyConsent = document.getElementById('inquiryPrivacyConsent').checked;
        const sensitiveConsent = document.getElementById('inquirySensitiveConsent').checked;

        if (!privacyConsent || !sensitiveConsent) {
          showToast('개인정보 및 민감정보 처리 동의가 모두 필요합니다.');
          return;
        }

        const phoneRegex = /^(01[016789]{1}|02|0[3-9]{1}[0-9]{1})-[0-9]{3,4}-[0-9]{4}$/;
        if (!phoneRegex.test(phone)) {
          showToast('올바른 연락처 형식(예: 010-1234-5678)으로 입력해 주세요.');
          return;
        }
        if (!name || name.length > 50 || !msg || msg.length > 1000) {
          showToast('성명은 50자 이하, 상담 내용은 1,000자 이하로 입력해 주세요.');
          return;
        }

        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        const receiptNo = `PR-${dateStr.replace(/-/g, '')}-${String(now.getTime()).slice(-6)}`;
        const payload = {
          receiptNo,
          name,
          phone,
          type: room,
          message: msg,
          status: '신규',
          followUp: false,
          memos: [],
          privacyConsent: true,
          sensitiveConsent: true,
          consentedAt: now.toISOString(),
          privacyPolicyVersion: '2026-07-15',
          createdAt: dateStr
        };

        setFormSubmitting('widgetInquiryForm', true);
        try {
          if (isFirebaseReady && authUser) {
            await getCollectionRef('inquiries').add(payload);
            form.reset();
            showInquiryResult(`<strong>입원 문의가 서버에 접수되었습니다.</strong><br>접수번호: <span class="font-mono font-black">${escapeHtml(receiptNo)}</span><br>상담 확인을 위해 접수번호를 보관해 주세요.`);
            showToast(`문의 접수 완료: ${receiptNo}`);
          } else {
            payload.id = `local-${Date.now()}`;
            inquiries.push(payload);
            form.reset();
            showInquiryResult(`<strong>테스트 모드 임시 접수입니다.</strong><br>임시번호: <span class="font-mono font-black">${escapeHtml(receiptNo)}</span><br>현재 브라우저에만 저장되었으며 서버에는 전송되지 않았습니다.`, 'local');
            showToast('테스트 모드: 서버 미전송 임시 접수');
          }
        } catch (error) {
          console.error('입원 문의 저장 실패', error);
          showInquiryResult('<strong>접수에 실패했습니다.</strong><br>입력 내용은 유지됩니다. 잠시 후 다시 시도하거나 051-867-7500으로 연락해 주세요.', 'error');
          showToast('서버 저장에 실패했습니다. 다시 시도해 주세요.');
        } finally {
          setFormSubmitting('widgetInquiryForm', false);
        }
      };

      const submitPublicComment = async (event) => {
        event.preventDefault();

        const form = document.getElementById('commentPublicForm');
        const author = document.getElementById('commentAuthor').value.trim();
        const noticeTitle = document.getElementById('commentNoticeSelect').value;
        const comment = document.getElementById('commentText').value.trim();
        const privacyConsent = document.getElementById('commentPrivacyConsent').checked;

        if (!privacyConsent) {
          showToast('댓글 등록을 위해 개인정보 수집·이용 동의가 필요합니다.');
          return;
        }
        if (!author || author.length > 50 || !comment || comment.length > 500) {
          showToast('작성자명은 50자 이하, 댓글은 500자 이하로 입력해 주세요.');
          return;
        }

        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const matchedNotice = notices.find(n => n.title === noticeTitle);
        const payload = {
          author,
          noticeId: matchedNotice ? matchedNotice.id : '1',
          noticeTitle,
          comment,
          isAnswered: false,
          privacyConsent: true,
          consentedAt: now.toISOString(),
          privacyPolicyVersion: '2026-07-15',
          createdAt: timeStr
        };

        setFormSubmitting('commentPublicForm', true);
        try {
          if (isFirebaseReady && authUser) {
            await getCollectionRef('comments').add(payload);
            form.reset();
            showToast('보호자 댓글이 서버에 등록되었습니다.');
          } else {
            payload.id = `local-${Date.now()}`;
            publicComments.push(payload);
            form.reset();
            showToast('테스트 모드: 댓글이 서버에는 전송되지 않았습니다.');
          }
        } catch (error) {
          console.error('보호자 댓글 저장 실패', error);
          showToast('댓글 저장에 실패했습니다. 입력 내용은 유지됩니다.');
        } finally {
          setFormSubmitting('commentPublicForm', false);
        }
      };

'''
          text = text[:start] + replacement + text[end:]

          notice_pattern = re.compile(
              r"      const openNoticePublicView = async \(id, options = \{\}\) => \{.*?\n      \};\n\s*\n      const closeNoticeViewModal",
              re.S,
          )
          notice_replacement = r'''      const openNoticePublicView = (id, options = {}) => {
        const n = notices.find(item => item.id === id);
        if (!n) return;

        n.count = Number(n.count || 0) + 1;
        renderNotice();
        document.getElementById('viewNoticeTitle').textContent = n.title;
        document.getElementById('viewNoticeDate').textContent = `등록일: ${n.createdAt} | 조회수: ${n.count}`;
        document.getElementById('viewNoticeBody').textContent = n.body;
        document.getElementById('noticeViewModal').classList.replace('hidden', 'flex');
        if (!options.fromHash && window.location.hash !== `#notice/${id}`) {
          window.location.hash = `#notice/${id}`;
        }
      };

      const closeNoticeViewModal'''
          text, n = notice_pattern.subn(notice_replacement, text, count=1)
          if n != 1:
              raise SystemExit('Could not replace public notice view logic')

          forbidden = [
              "getCollectionRef('notices').doc(id).update",
              '박순임',
              '정태식',
              '010-9821-3442',
              '010-4491-0012',
              'Fallback 로컬 복구 자동전환'
          ]
          remaining = [item for item in forbidden if item in text]
          if remaining:
              raise SystemExit('Forbidden residue remains: ' + ', '.join(remaining))

          required = [
              'setFormSubmitting',
              '테스트 모드 임시 접수입니다.',
              '서버 저장에 실패했습니다.',
              "getCollectionRef('inquiries').add(payload)",
              "getCollectionRef('comments').add(payload)",
              'const openNoticePublicView = (id, options = {})'
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('Required hardening missing: ' + ', '.join(missing))

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate module JavaScript syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          start = text.index('<script type="module">') + len('<script type="module">')
          end = text.index('</script>', start)
          Path('/tmp/public-index.mjs').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/public-index.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo 'No changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Improve test submission result handling'
          git push origin HEAD:agent/production-ready-refactor
