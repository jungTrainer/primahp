name: Clean public PR3

on:
  pull_request_target:
    types: [edited]

permissions:
  contents: write
  pull-requests: read

jobs:
  clean:
    if: github.event.pull_request.number == 3 && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/production-ready-refactor'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-ready-refactor
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remove remaining administrator runtime from public page
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          start_marker = '      /* ================= 8. INLINE SECTIONS EDITORS ================= */'
          end_marker = '      /* ================= 10. PUBLIC USER INPUTS & VALIDATION ================= */'
          start = text.find(start_marker)
          end = text.find(end_marker)
          if start >= 0 and end > start:
              text = text[:start] + end_marker + text[end + len(end_marker):]

          replacements = {
              "          } else {\n            notices.forEach(n => getCollectionRef('notices').doc(n.id).set(n));\n          }": "          }",
              "          } else {\n            workingStaff.forEach(s => getCollectionRef('staff').doc(s.id).set(s));\n          }": "          }",
              "          } else {\n            albums.forEach(a => getCollectionRef('gallery').doc(a.id).set(a));\n          }": "          }",
          }
          for old, new in replacements.items():
              text = text.replace(old, new)

          forbidden = [
              'toggleSectionEdit',
              'applySectionEdit',
              'isAdminLoggedIn',
              'submitAdminLogin',
              'renderAdminDashboard',
              'openStaffAddModal',
              'openAddAlbumModal',
              'openAddNoticeModal',
              'handleStaffPhotoUpload',
              'handleAlbumPhotoUpload',
              'id="view-admin"',
              'id="loginModal"',
              'id="staffModal"',
              'id="albumModal"',
              'id="noticeModal"'
          ]
          remaining = [item for item in forbidden if item in text]
          if remaining:
              raise SystemExit('Administrator residue remains: ' + ', '.join(remaining))

          required = [
              'id="widgetInquiryForm"',
              'id="inquiryPrivacyConsent"',
              'id="inquirySensitiveConsent"',
              'id="commentPublicForm"',
              'id="commentPrivacyConsent"',
              'const routeFromHash',
              'const submitHomeInquiry',
              'const submitPublicComment',
              'const renderStaff',
              'const renderGallery',
              'const renderNotice'
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('Required public feature missing: ' + ', '.join(missing))

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate public JavaScript syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('index.html').read_text(encoding='utf-8')
          start = text.index('<script type="module">') + len('<script type="module">')
          end = text.index('</script>', start)
          Path('/tmp/public-index.mjs').write_text(text[start:end], encoding='utf-8')
          PY
          node --check /tmp/public-index.mjs

      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo 'No changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Remove remaining admin runtime from public page'
          git push origin HEAD:agent/production-ready-refactor
