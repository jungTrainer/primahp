name: Apply PR 1 priority patch

on:
  pull_request_target:
    types: [edited, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  patch:
    if: github.event.pull_request.number == 1 && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/privacy-and-routing'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/privacy-and-routing
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply priority patches
        run: |
          node scripts/apply-priority-patch.js
          node scripts/apply-runtime-fixes.js
      - name: Validate generated index
        run: |
          grep -q 'inquiryPrivacyConsent' index.html
          grep -q 'inquirySensitiveConsent' index.html
          grep -q 'commentPrivacyConsent' index.html
          grep -q 'routeFromHash' index.html
          grep -q 'confirmModalBtnNo' index.html
          grep -q 'privacy.html' index.html
          grep -q 'const showToast' index.html
          grep -q 'const closeConfirmModal' index.html
          grep -q 'window.closeConfirmModal' index.html
      - name: Commit and push generated changes
        run: |
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Apply privacy and runtime fixes'
          git push origin HEAD:agent/privacy-and-routing
