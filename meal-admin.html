<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>프리마요양병원 식단 게시자</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-100 text-slate-900"><header class="border-b bg-white"><div class="mx-auto flex max-w-6xl items-center justify-between px-5 py-5"><div class="flex items-center gap-3"><img src="assets/logo.png" class="h-11 w-11 object-contain"><div><strong>프리마요양병원</strong><p class="text-xs text-slate-500">식단 게시자</p></div></div><div class="flex gap-2"><a href="index.html#meals" class="rounded-lg border px-4 py-2 text-sm font-bold">식단 보기</a><button id="logout" class="hidden rounded-lg bg-slate-950 px-4 py-2 text-sm font-bold text-white">로그아웃</button></div></div></header><main class="mx-auto max-w-6xl px-5 py-10"><section id="login" class="mx-auto max-w-md rounded-3xl bg-white p-7 shadow-sm"><h1 class="text-2xl font-black">식단 게시자 로그인</h1><form id="login-form" class="mt-6 grid gap-4"><input id="email" type="email" required placeholder="이메일" class="rounded-xl border px-4 py-3"><input id="password" type="password" required placeholder="비밀번호" class="rounded-xl border px-4 py-3"><div id="login-msg" class="hidden rounded-xl border p-3 text-sm"></div><button class="rounded-xl bg-slate-950 px-5 py-4 font-black text-white">로그인</button></form><a href="register.html" class="mt-5 block text-center text-sm font-bold text-sky-700">식단 게시자 가입 신청</a></section><section id="panel" class="hidden grid gap-7 lg:grid-cols-[.9fr_1.1fr]"><form id="meal-form" class="rounded-3xl bg-white p-6 shadow-sm"><h1 class="text-2xl font-black">주간 식단 등록</h1><ol class="mt-3 list-decimal space-y-1 pl-5 text-sm text-slate-500"><li>주차 제목과 시작일을 입력합니다.</li><li>식단표 이미지 1장을 선택합니다.</li><li>음식 사진은 여러 장 선택할 수 있습니다.</li><li>이미지는 자동 축소 후 저장됩니다.</li></ol><input id="meal-id" type="hidden"><input id="current-menu" type="hidden"><div class="mt-6 grid gap-4"><label class="text-sm font-bold">주차 제목<input id="title" required placeholder="예: 7월 3주차 · 7/13~7/19" class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"></label><label class="text-sm font-bold">기간 시작일<input id="period-start" type="date" required class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"></label><label class="text-sm font-bold">식단표 이미지<input id="menu-image" type="file" accept="image/jpeg,image/png,image/webp" class="mt-2 block w-full rounded-xl border p-3 font-normal"><span id="menu-size" class="mt-1 block text-xs font-normal text-slate-400"></span></label><label class="text-sm font-bold">음식 사진(선택, 여러 장)<input id="food-photos" type="file" multiple accept="image/jpeg,image/png,image/webp" class="mt-2 block w-full rounded-xl border p-3 font-normal"></label><div id="preview" class="grid grid-cols-3 gap-2"></div><label class="text-sm font-bold">메모<textarea id="note" rows="3" class="mt-2 w-full rounded-xl border px-4 py-3 font-normal"></textarea></label><div id="status" class="hidden rounded-xl border p-4 text-sm"></div><div class="flex gap-2"><button class="rounded-xl bg-sky-700 px-5 py-3 font-black text-white">저장</button><button id="reset" type="button" class="rounded-xl border px-5 py-3 font-bold">새로 작성</button></div></div></form><section class="rounded-3xl bg-white p-6 shadow-sm"><div class="flex items-center justify-between"><h2 class="text-xl font-black">등록된 식단</h2><button id="refresh" class="rounded-lg border px-3 py-2 text-sm font-bold">새로고침</button></div><div id="list" class="mt-5 grid gap-4"></div></section></section></main><script src="firebase-config.js"></script><script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-storage-compat.js"></script><script src="assets/image-utils.js"></script><script src="assets/meal-admin.js"></script></body></html>
