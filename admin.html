<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프리마요양병원 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { navy: '#0F172A', blue: '#0369A1', light: '#F8FAFC', border: '#E2E8F0' }
          }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    .drag-handle { cursor: grab; }
    .sortable-ghost { opacity: .4; }
    .sortable-chosen { outline: 2px solid #0369A1; }
  </style>
</head>
<body class="bg-brand-light text-brand-navy">
  <header class="border-b border-brand-border bg-white">
    <div class="mx-auto flex max-w-[1600px] items-center justify-between px-4 py-5">
      <div>
        <h1 class="text-xl font-black">프리마요양병원 관리자</h1>
        <p class="text-xs text-slate-500">홈페이지 화면에서 항목을 클릭해 직접 편집합니다.</p>
      </div>
      <div class="flex gap-2">
        <a href="index.html" target="_blank" class="rounded-lg border px-4 py-2 text-xs font-bold">홈페이지</a>
        <button id="logout" class="hidden rounded-lg bg-brand-navy px-4 py-2 text-xs font-bold text-white">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-[1600px] px-4 py-8">
    <div id="setup" class="hidden rounded-2xl border border-amber-200 bg-amber-50 p-6 text-sm">
      먼저 <code>firebase-config.js</code>에 Firebase 설정을 입력하세요.
      자세한 내용은 <a href="docs/firebase-admin-setup.md" class="font-bold text-brand-blue underline">설정 문서</a>를 확인하세요.
    </div>

    <section id="login" class="mx-auto hidden max-w-md rounded-3xl bg-white p-8 shadow">
      <h2 class="text-2xl font-black">관리자 로그인</h2>
      <form id="login-form" class="mt-6 space-y-4">
        <input id="email" type="email" required placeholder="이메일" class="w-full rounded-xl border p-3">
        <input id="password" type="password" required placeholder="비밀번호" class="w-full rounded-xl border p-3">
        <p id="login-msg" class="hidden rounded-xl border p-3 text-xs"></p>
        <button class="w-full rounded-xl bg-brand-navy py-3 text-sm font-bold text-white">로그인</button>
      </form>
    </section>

    <section id="panel" class="hidden">
      <div id="msg" class="mb-5 hidden rounded-xl border p-4 text-xs"></div>

      <div class="grid gap-6 lg:grid-cols-2">
        <form id="home-form" class="rounded-3xl bg-white p-6 shadow-sm">
          <h2 class="text-lg font-black">홈 대표 이미지·문구</h2>
          <div class="mt-5 space-y-3">
            <input id="heroEyebrow" maxlength="80" placeholder="상단 문구" class="w-full rounded-xl border p-3">
            <textarea id="homeTitle" rows="2" maxlength="150" placeholder="대표 제목 (줄바꿈 가능)" class="w-full rounded-xl border p-3"></textarea>
            <textarea id="homeDesc" rows="3" maxlength="500" placeholder="대표 설명" class="w-full rounded-xl border p-3"></textarea>
            <input id="heroImage" type="file" accept="image/jpeg,image/png,image/webp" class="w-full rounded-xl border border-dashed p-3">
            <input id="heroImageAlt" maxlength="120" placeholder="이미지 설명" class="w-full rounded-xl border p-3">
            <textarea id="facilityIntro" rows="2" maxlength="500" placeholder="시설 소개" class="w-full rounded-xl border p-3"></textarea>
            <textarea id="certificationIntro" rows="2" maxlength="500" placeholder="인증 소개" class="w-full rounded-xl border p-3"></textarea>
            <button class="rounded-xl bg-brand-blue px-5 py-3 text-xs font-bold text-white">홈 저장</button>
          </div>
        </form>

        <form id="item-form" class="rounded-3xl bg-white p-6 shadow-sm">
          <h2 class="text-lg font-black">사진 콘텐츠 등록</h2>
          <p class="mt-1 text-xs text-slate-500">시설, 의료진, 갤러리, 인증 자료를 등록합니다.</p>
          <div class="mt-5 space-y-3">
            <select id="kind" class="w-full rounded-xl border p-3">
              <option value="facilities">시설</option>
              <option value="staff">의료진·직원</option>
              <option value="gallery">갤러리</option>
              <option value="certifications">인증·평가</option>
            </select>
            <input id="item-id" type="hidden">
            <input id="current-photo" type="hidden">
            <div id="staff-fields" class="hidden space-y-3">
              <select id="department" class="w-full rounded-xl border p-3">
                <option value="medical">의료부</option>
                <option value="nursing">간호부</option>
                <option value="rehab">재활치료과</option>
                <option value="admin">행정지원과</option>
              </select>
              <input id="position" maxlength="100" placeholder="직책·전문분야" class="w-full rounded-xl border p-3">
            </div>
            <input id="title" maxlength="150" required placeholder="명칭 또는 성명" class="w-full rounded-xl border p-3">
            <input id="sub" maxlength="80" placeholder="시설 분류 / 날짜 / 인증 연도" class="w-full rounded-xl border p-3">
            <textarea id="desc" rows="4" maxlength="700" required placeholder="설명" class="w-full rounded-xl border p-3"></textarea>
            <label class="block text-xs font-bold text-slate-600">
              사진 (선택 시 칸 비율로 자르는 화면이 열립니다)
              <input id="photo" type="file" accept="image/jpeg,image/png,image/webp" class="mt-1 w-full rounded-xl border border-dashed p-3">
            </label>
            <label class="flex gap-2 text-[11px] text-slate-600">
              <input id="verified" type="checkbox" required>
              <span>사진 게시 동의 또는 인증 증빙 확인을 완료했습니다.</span>
            </label>
            <label class="block text-[11px] text-slate-500">
              순서 번호 (작을수록 앞. 목록에서 드래그로 바꾸는 걸 권장)
              <input id="order" type="number" value="10" min="0" max="999" class="mt-1 w-full rounded-xl border p-3">
            </label>
            <div class="flex gap-2">
              <button class="rounded-xl bg-brand-blue px-5 py-3 text-xs font-bold text-white">저장</button>
              <button id="reset" type="button" class="rounded-xl border px-5 py-3 text-xs font-bold">새로 작성</button>
            </div>
          </div>
        </form>
      </div>

      <div class="mt-6 rounded-3xl bg-white p-6 shadow-sm">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-lg font-black">등록된 콘텐츠</h2>
            <p class="mt-1 text-xs text-slate-500">카드 왼쪽 위 <strong>⠿ 이동</strong>을 잡고 드래그하면 순서가 바뀌고 자동 저장됩니다.</p>
          </div>
          <button id="refresh" class="rounded-lg border px-4 py-2 text-xs font-bold">새로고침</button>
        </div>
        <div id="list" class="mt-5 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
      </div>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-storage-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <script src="assets/admin.js"></script>
  <script src="assets/admin-oncanvas.js"></script>
</body>
</html>
